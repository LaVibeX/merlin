<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merlin Paper Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Lexend:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left"></div>
    <div class="bg-shape bg-shape-right"></div>

    <main class="layout">
      <aside class="panel sidebar">
        <div class="sidebar-top">
          <h1>Merlin Reader</h1>
          <button id="toggleSidebarBtn" class="secondary icon-btn" type="button" aria-label="Hide Folder" title="Hide Folder">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="m18.75 4.5-7.5 7.5 7.5 7.5m-6-15L5.25 12l7.5 7.5" />
            </svg>
          </button>
        </div>
        <p class="subtitle collapsible">Link your paper folder, open PDFs, and annotate as you study.</p>

        <label class="collapsible" for="folderInput">PDF Folder</label>
        <div class="row collapsible">
          <input id="folderInput" type="text" placeholder="Select a folder" readonly />
          <button id="pickFolderBtn" class="secondary">Choose</button>
        </div>

        <div class="pdf-header collapsible">
          <h2>Papers</h2>
          <button id="refreshBtn" class="secondary">Refresh</button>
        </div>
        <ul id="pdfList" class="pdf-list collapsible"></ul>
      </aside>

      <section class="panel content">
        <div class="toolbar">
          <strong id="activePaper">No paper selected</strong>
          <div class="toolbar-actions">
            <label class="speed-control" for="speedSelect">Speed</label>
            <select id="speedSelect" aria-label="Reading speed">
              <option value="1">1x</option>
              <option value="1.25" selected>1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="1.75">1.75x</option>
              <option value="2">2x</option>
            </select>
            <button id="themeToggleBtn" class="secondary">Dark Mode</button>
            <button id="bionicToggleBtn" class="secondary">Bionic: Off</button>
            <button id="readBtn">Read Aloud</button>
            <button id="stopReadBtn" class="secondary">Stop</button>
            <button id="saveBtn" class="accent">Save Annotations</button>
          </div>
        </div>

        <div class="grid">
          <article id="viewerPanel" class="viewer">
            <div class="viewer-top">
              <h3>PDF Preview</h3>
              <button id="expandPdfBtn" class="secondary icon-btn" type="button" aria-label="Expand PDF" title="Expand PDF">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                </svg>
              </button>
            </div>
            <iframe id="pdfFrame" title="PDF preview"></iframe>
          </article>

          <article id="textReaderPanel" class="text-reader">
            <div class="text-reader-top">
              <h3>Extracted Text (Click a line to highlight)</h3>
              <button id="expandTextBtn" class="secondary icon-btn" type="button" aria-label="Expand Extracted Text" title="Expand Extracted Text">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                </svg>
              </button>
            </div>
            <div id="paperText" class="paper-text"></div>
          </article>
        </div>

        <div class="notes-grid">
          <article>
            <h3>Paper Notes</h3>
            <textarea id="notesInput" rows="4" placeholder="Write your summary, key ideas, or TODOs..."></textarea>
          </article>

          <article>
            <h3>Comments on Selected Line</h3>
            <p id="selectedLineHint">Select a line in the text panel first.</p>
            <textarea id="commentInput" rows="4" placeholder="Add a comment for the selected line..."></textarea>
            <div class="row">
              <button id="addCommentBtn">Add Comment</button>
            </div>
            <ul id="commentList" class="comment-list"></ul>
          </article>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
